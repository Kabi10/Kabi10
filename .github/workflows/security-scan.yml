name: Security Scanning

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # CodeQL Static Analysis for Android/Kotlin code
  codeql-android:
    name: CodeQL Analysis (Android)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create required files for build
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo '{
            "project_info": { "project_number": "000", "project_id": "ci", "storage_bucket": "ci.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000:android:000", "android_client_info": { "package_name": "com.senthapps.slagrimarket" } }, "oauth_client": [], "api_key": [{ "current_key": "key" }], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } }],
            "configuration_version": "1"
          }' > app/google-services.json
      
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

  # CodeQL Static Analysis for JavaScript/Node.js backend
  codeql-javascript:
    name: CodeQL Analysis (JavaScript)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # Dependency vulnerability scanning for Android
  dependency-scan-android:
    name: Dependency Scan (Android)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Create required files
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo '{"project_info":{"project_number":"0","project_id":"ci","storage_bucket":"ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.senthapps.slagrimarket"}},"oauth_client":[],"api_key":[{"current_key":"k"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
      
      - name: Run Gradle Dependency Check
        run: |
          chmod +x gradlew
          ./gradlew dependencies --configuration releaseRuntimeClasspath > dependency-report.txt 2>&1 || true
      
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: android-dependency-report
          path: dependency-report.txt
          retention-days: 30

  # Dependency vulnerability scanning for Node.js backend
  dependency-scan-node:
    name: Dependency Scan (Node.js)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --ignore-scripts || npm install --ignore-scripts
      
      - name: Run npm audit
        working-directory: ./backend
        run: npm audit --json > ../npm-audit-report.json || true
      
      - name: Check for critical vulnerabilities
        run: |
          if [ -f npm-audit-report.json ]; then
            CRITICAL=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
            HIGH=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.high // 0')
            echo "Critical vulnerabilities: $CRITICAL"
            echo "High vulnerabilities: $HIGH"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL critical vulnerabilities!"
              exit 1
            fi
          fi
      
      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

