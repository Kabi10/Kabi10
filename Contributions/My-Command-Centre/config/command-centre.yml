# My Command Centre Configuration
# Central configuration for all automation and intelligence features

# Repository Discovery Settings
repository_discovery:
  # Scan frequency (cron format)
  schedule: "0 6 * * *"  # Daily at 6 AM UTC
  
  # Repository filters
  filters:
    include_private: true
    include_public: true
    exclude_forks: false
    exclude_archived: false
    min_activity_days: 365  # Include repos active within last year
  
  # Metadata collection settings
  metadata:
    collect_stars: true
    collect_forks: true
    collect_languages: true
    collect_contributors: true
    collect_issues: true
    collect_pull_requests: true
    collect_releases: true
    collect_topics: true

# Health Scoring Algorithm
health_scoring:
  # Weight factors (must sum to 100)
  weights:
    commit_frequency: 25      # Recent commit activity
    documentation_quality: 20 # README, docs, comments
    issue_response_time: 15   # How quickly issues are addressed
    community_engagement: 15  # Stars, forks, contributors
    code_quality: 15          # CodeQL, test coverage
    maintenance: 10           # Dependencies, security alerts
  
  # Scoring thresholds
  thresholds:
    excellent: 85
    good: 70
    fair: 50
    poor: 30

# Analytics & Reporting
analytics:
  # Report generation schedule
  daily_reports: true
  weekly_reports: true
  monthly_reports: true
  
  # Report types
  reports:
    portfolio_overview: true
    activity_heatmap: true
    contribution_patterns: true
    health_trends: true
    maintenance_alerts: true
  
  # Data retention (days)
  retention:
    daily_data: 90
    weekly_data: 365
    monthly_data: 1095  # 3 years

# Strategic Planning
strategy:
  # Planning categories
  categories:
    - development_thoughts
    - project_timelines
    - contribution_methodology
    - repository_curation
    - professional_development
  
  # Template auto-generation
  auto_templates: true
  cross_reference: true

# Workflow Integration
workflow_integration:
  # Real-time monitoring
  webhook_events:
    - push
    - pull_request
    - issues
    - release
    - star
    - fork
  
  # Code quality monitoring
  code_quality:
    enable_codeql: true
    enable_dependabot: true
    enable_security_advisories: true
  
  # Technical debt tracking
  technical_debt:
    auto_issue_creation: true
    severity_thresholds:
      critical: 1    # Create issue immediately
      high: 7        # Create issue after 7 days
      medium: 30     # Create issue after 30 days
      low: 90        # Create issue after 90 days

# Dashboard Configuration
dashboard:
  # GitHub Pages settings
  enable_pages: true
  theme: "minimal"
  
  # Dashboard components
  components:
    portfolio_health: true
    activity_charts: true
    contribution_timeline: true
    repository_grid: true
    alert_summary: true
  
  # Update frequency
  update_schedule: "0 */6 * * *"  # Every 6 hours

# Intelligence & Automation
intelligence:
  # Alert settings
  alerts:
    enable_github_issues: true
    alert_labels:
      - "command-centre"
      - "automated-alert"
    
    # Alert types
    types:
      maintenance_needed: true
      contribution_opportunity: true
      portfolio_optimization: true
      security_update: true
  
  # AI-powered insights (using GitHub's built-in analytics)
  insights:
    trend_analysis: true
    anomaly_detection: true
    recommendation_engine: true

# Privacy & Security
security:
  # Access control
  private_repository: true
  restricted_access: true
  
  # Data encryption
  encrypt_sensitive_data: true
  
  # Audit logging
  audit_logging:
    enable: true
    log_level: "INFO"
    retention_days: 365
  
  # No external dependencies
  external_apis: false
  third_party_services: false

# Open Source Contribution Tracking
open_source:
  # Target projects
  target_projects:
    - name: "HMIS"
      repo: "hmislk/hmis"
      fork: "Kabi10/hmis"
      focus_areas:
        - "healthcare software"
        - "Sri Lankan social good"
      contribution_types:
        - "bug fixes"
        - "performance improvements"
        - "code improvements"
    
    - name: "Sri Lankan Social Good Projects"
      focus_areas:
        - "government digitization"
        - "healthcare systems"
        - "education technology"
      
  # Contribution methodology
  methodology:
    commit_format: "Closes #issueNumber with signed-off-by"
    target_branch: "development"
    branch_naming: "fix/issue-description or perf/feature-description"
    backward_compatibility: true
    
  # Progress tracking
  tracking:
    contributions_per_month: 4
    focus_rotation_weeks: 2
    methodology_review_months: 3

# Notification Settings
notifications:
  # Channels (all via GitHub)
  channels:
    github_issues: true
    github_discussions: false
    email_via_github: true
  
  # Frequency limits
  max_daily_alerts: 5
  max_weekly_reports: 1
  
  # Priority levels
  priorities:
    critical: "immediate"
    high: "daily"
    medium: "weekly"
    low: "monthly"
