name: Security & Maintenance

on:
  schedule:
    # Run daily at 2 AM UTC for security checks
    - cron: '0 2 * * *'
    # Run weekly on Saturdays at 3 AM UTC for maintenance
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      maintenance_type:
        description: 'Type of maintenance to run'
        required: false
        default: 'all'
        type: choice
        options:
        - all
        - security
        - cleanup
        - dependencies
        - audit

permissions:
  contents: write
  security-events: write
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        pip install -r scripts/requirements.txt
        npm install --prefix scripts/
        npm install --prefix dashboard/

    - name: Run Python security scan
      run: |
        pip install safety bandit
        safety check --json --output analytics/security/python-safety-report.json || true
        bandit -r scripts/ -f json -o analytics/security/python-bandit-report.json || true

    - name: Run Node.js security scan
      run: |
        cd scripts && npm audit --json > ../analytics/security/npm-audit-scripts.json || true
        cd dashboard && npm audit --json > ../analytics/security/npm-audit-dashboard.json || true

    - name: Scan for secrets
      run: |
        python scripts/secret_scanner.py \
          --config config/command-centre.yml \
          --output analytics/security/secret-scan-report.json

    - name: Check file permissions
      run: |
        python scripts/permission_checker.py \
          --config config/command-centre.yml \
          --output analytics/security/permission-report.json

    - name: Generate security report
      run: |
        python scripts/security_reporter.py \
          --config config/command-centre.yml \
          --security-dir analytics/security/ \
          --output analytics/security/security-summary.md

    - name: Create security issues if needed
      run: |
        python scripts/security_issue_creator.py \
          --config config/command-centre.yml \
          --security-report analytics/security/security-summary.md \
          --github-token ${{ secrets.GITHUB_TOKEN }}

    - name: Commit security reports
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        mkdir -p analytics/security
        git add analytics/security/
        if git diff --staged --quiet; then
          echo "No security changes to commit"
        else
          git commit -m "🔒 Security scan results - $(date -u +%Y-%m-%d)"
          git push
        fi

  dependency-maintenance:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 6' || github.event.inputs.maintenance_type == 'all' || github.event.inputs.maintenance_type == 'dependencies'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Check Python dependencies
      run: |
        pip install pip-check-reqs pip-audit
        pip-audit --format=json --output=analytics/maintenance/python-audit.json || true
        pip-check-reqs --ignore-files=venv scripts/ > analytics/maintenance/python-deps-check.txt || true

    - name: Check Node.js dependencies
      run: |
        cd scripts && npm outdated --json > ../analytics/maintenance/npm-outdated-scripts.json || true
        cd dashboard && npm outdated --json > ../analytics/maintenance/npm-outdated-dashboard.json || true

    - name: Generate dependency report
      run: |
        python scripts/dependency_reporter.py \
          --config config/command-centre.yml \
          --maintenance-dir analytics/maintenance/ \
          --output analytics/maintenance/dependency-report.md

    - name: Create dependency update issues
      run: |
        python scripts/dependency_issue_creator.py \
          --config config/command-centre.yml \
          --dependency-report analytics/maintenance/dependency-report.md \
          --github-token ${{ secrets.GITHUB_TOKEN }}

    - name: Commit dependency reports
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        mkdir -p analytics/maintenance
        git add analytics/maintenance/
        if git diff --staged --quiet; then
          echo "No dependency changes to commit"
        else
          git commit -m "📦 Dependency maintenance - $(date -u +%Y-%m-%d)"
          git push
        fi

  cleanup-maintenance:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 6' || github.event.inputs.maintenance_type == 'all' || github.event.inputs.maintenance_type == 'cleanup'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r scripts/requirements.txt

    - name: Cleanup old analytics files
      run: |
        python scripts/analytics_cleaner.py \
          --config config/command-centre.yml \
          --analytics-dir analytics/ \
          --retention-days 90

    - name: Cleanup old audit logs
      run: |
        python scripts/audit_cleaner.py \
          --config config/command-centre.yml \
          --audit-dir analytics/audit/ \
          --retention-days 365

    - name: Optimize repository size
      run: |
        python scripts/repo_optimizer.py \
          --config config/command-centre.yml \
          --output analytics/maintenance/optimization-report.md

    - name: Clean up temporary files
      run: |
        find . -name "*.tmp" -delete
        find . -name "*.log" -mtime +7 -delete
        find . -name "__pycache__" -type d -exec rm -rf {} + || true

    - name: Commit cleanup changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add analytics/
        if git diff --staged --quiet; then
          echo "No cleanup changes to commit"
        else
          git commit -m "🧹 Maintenance cleanup - $(date -u +%Y-%m-%d)"
          git push
        fi

  audit-review:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 6' || github.event.inputs.maintenance_type == 'all' || github.event.inputs.maintenance_type == 'audit'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r scripts/requirements.txt

    - name: Generate weekly audit report
      run: |
        python scripts/audit_logger.py \
          --generate-report \
          --start-date $(date -d '7 days ago' +%Y-%m-%d) \
          --end-date $(date +%Y-%m-%d) \
          --config config/command-centre.yml

    - name: Analyze audit patterns
      run: |
        python scripts/audit_analyzer.py \
          --config config/command-centre.yml \
          --audit-dir analytics/audit/ \
          --output analytics/audit/audit-analysis.md

    - name: Check for security anomalies
      run: |
        python scripts/security_anomaly_detector.py \
          --config config/command-centre.yml \
          --audit-dir analytics/audit/ \
          --output analytics/security/anomaly-report.md

    - name: Create audit review issue
      run: |
        python scripts/audit_review_issue_creator.py \
          --config config/command-centre.yml \
          --audit-analysis analytics/audit/audit-analysis.md \
          --github-token ${{ secrets.GITHUB_TOKEN }}

    - name: Commit audit reports
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add analytics/audit/ analytics/security/
        if git diff --staged --quiet; then
          echo "No audit changes to commit"
        else
          git commit -m "📋 Audit review - $(date -u +%Y-%m-%d)"
          git push
        fi

  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r scripts/requirements.txt

    - name: Check system health
      run: |
        python scripts/system_health_checker.py \
          --config config/command-centre.yml \
          --output analytics/maintenance/system-health.json

    - name: Validate configuration
      run: |
        python scripts/config_validator.py \
          --config config/command-centre.yml \
          --output analytics/maintenance/config-validation.json

    - name: Test automation scripts
      run: |
        python scripts/automation_tester.py \
          --config config/command-centre.yml \
          --output analytics/maintenance/automation-test.json

    - name: Generate health report
      run: |
        python scripts/health_reporter.py \
          --config config/command-centre.yml \
          --health-data analytics/maintenance/system-health.json \
          --validation-data analytics/maintenance/config-validation.json \
          --test-data analytics/maintenance/automation-test.json \
          --output analytics/maintenance/health-report.md

    - name: Create health issues if needed
      run: |
        python scripts/health_issue_creator.py \
          --config config/command-centre.yml \
          --health-report analytics/maintenance/health-report.md \
          --github-token ${{ secrets.GITHUB_TOKEN }}

    - name: Commit health reports
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add analytics/maintenance/
        if git diff --staged --quiet; then
          echo "No health changes to commit"
        else
          git commit -m "🏥 System health check - $(date -u +%Y-%m-%d)"
          git push
        fi

    - name: Log maintenance completion
      run: |
        python scripts/audit_logger.py \
          --workflow-name "security-maintenance" \
          --run-id ${{ github.run_id }} \
          --status "completed" \
          --config config/command-centre.yml
